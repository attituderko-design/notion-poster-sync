{% extends "form/base.html" %}
{% block content %}

<div class="wordmark f1">
  <div class="wordmark-title">ArtéMis HARMONIA</div>
  <div class="wordmark-sub">Concert Management</div>
</div>

{% if back_href %}
<a href="{{ back_href }}" class="back-btn f2">← 戻る</a>
{% endif %}

{% if error %}
<div class="alert alert-error f2">{{ error }}</div>
{% endif %}

<div class="f2">
  <div class="scr-title">パスワードを設定</div>
  <div class="scr-sub">次回からパスワードでログインできます（6文字以上）</div>
</div>

<form method="post" action="/login/set-password" class="f3">
  <div class="form-group">
    <label class="form-label" for="password">パスワード</label>
    <input class="form-input" type="password" id="password" name="password"
           placeholder="6文字以上" required minlength="6">
  </div>
  <div class="form-group">
    <label class="form-label" for="password_confirm">パスワード（確認）</label>
    <input class="form-input" type="password" id="password_confirm" name="password_confirm"
           placeholder="もう一度入力" required minlength="6">
  </div>
  <button class="btn btn-primary" type="submit">設定してフォームへ</button>
</form>

<div class="f4" style="margin-top:16px;">
  <a href="/concert/select" class="btn btn-secondary">スキップ（後で設定）</a>
</div>

{% endblock %}
