<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtéMis HARMONIA</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="apple-touch-icon" href="/static/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/css/style.css">
{% block extra_head %}{% endblock %}
</head>
<body>
<div id="global-loader" class="global-loader" aria-hidden="true">
  <div class="loader-card">
    <div class="loader-orbit"><div class="loader-core"></div></div>
    <div class="loader-title">Loading</div>
    <div class="loader-stage js-loader-stage">初期化</div>
    <div class="loader-fact js-loader-fact" aria-live="polite"></div>
    <div class="loader-progress-track" aria-hidden="true">
      <div class="loader-progress-bar js-loader-progress"></div>
    </div>
    <div class="loader-progress-label"><span class="js-loader-percent">0%</span></div>
  </div>
</div>
<div class="container">
  {% block content %}{% endblock %}
  <div class="footer">ArtéMis HARMONIA</div>
</div>
{% block scripts %}{% endblock %}
<script>
(() => {
  const loader = document.getElementById("global-loader");
  if (!loader) return;
  const progressBar = loader.querySelector(".js-loader-progress");
  const percentLabel = loader.querySelector(".js-loader-percent");
  const stageLabel = loader.querySelector(".js-loader-stage");
  const factNode = loader.querySelector(".js-loader-fact");
  const bootAt = performance.now();
  const MIN_VISIBLE_MS = 400;
  const FACT_INTERVAL_MS = 3800;
  let hideTimer = null;
  let progressTimer = null;
  let factTimer = null;
  let stageTimers = [];
  let softTarget = 0;
  let progress = 0;
  const facts = [
    "ベートーヴェンは難聴が進んだあとも作曲を続けました。",
    "モーツァルトは幼い頃から各地で演奏旅行をしていました。",
    "バッハ一族には音楽家が非常に多くいました。",
    "ハイドンは「交響曲の父」と呼ばれることがあります。",
    "シューベルトの歌曲は、詩と旋律の結びつきの強さで有名です。",
    "ショパンの主要作品はピアノ中心です。",
    "リストは指揮者・教育者としても大きな影響を残しました。",
    "ワーグナー作品ではライトモティーフが有名です。",
    "マーラーの交響曲は、大編成になることがよくあります。",
    "ブルックナーは交響曲を何度も改訂したことで知られています。",
    "ラヴェルは精密なオーケストレーションで有名です。",
    "ストラヴィンスキーは時期ごとに作風がかなり変わる作曲家です。",
    "協奏曲は、独奏とオーケストラのやり取りが大きな聴きどころです。",
    "弦楽四重奏は、室内楽の王道のひとつとされます。",
    "レクイエムは死者のためのミサに由来する作品群です。",
    "変奏曲は、ひとつの主題が少しずつ姿を変えていく面白さがあります。",
    "フーガは、主題を追いかけるように各声部が入ってくる書法です。",
    "昔の楽器と現代の楽器では、同じ曲でも音の性格がかなり変わります。",
    "クラシックの正解はひとつとは限らず、解釈の幅も魅力です。",
    "ラヴェルの《ボレロ》は同じリズムが続くのに最後まで聴かせ切る曲です。",
    "ストラヴィンスキー《春の祭典》初演は衝撃的な出来事として語られます。",
    "ティンパニの1発で空気が変わる瞬間、結構あります。",
    "目立たないけど大事な音ほど、合奏ではよく効きます。",
    "演奏会は、始まる前の静けさからもう半分始まっています。",
    "出欠の未回答は、運営を静かに止めます。",
    "パート希望は早めに入るほど、アサインの精度が上がります。",
    "所有楽器の入力は、未来の自分を助けます。",
    "予定が怪しい時ほど、先に△を入れておくと運営が助かります。"
  ];
  const shuffled = facts
    .map((v) => ({ v, r: Math.random() }))
    .sort((a, b) => a.r - b.r)
    .map((x) => x.v);
  let factIdx = 0;

  const setProgress = (v) => {
    progress = Math.max(0, Math.min(100, v));
    if (progressBar) progressBar.style.width = `${progress.toFixed(1)}%`;
    if (percentLabel) percentLabel.textContent = `${Math.round(progress)}%`;
  };
  const setStage = (label, pct) => {
    if (stageLabel) stageLabel.textContent = label || "";
    softTarget = Math.max(softTarget, Math.min(96, pct || 0));
    setProgress(Math.max(progress, softTarget));
  };
  const clearStageTimers = () => {
    stageTimers.forEach((t) => clearTimeout(t));
    stageTimers = [];
  };
  const startStagePlan = () => {
    clearStageTimers();
    const plan = [
      { at: 0, label: "初期化", pct: 5 },
      { at: 120, label: "セッション確認", pct: 12 },
      { at: 320, label: "データ接続", pct: 22 },
      { at: 640, label: "データ取得", pct: 36 },
      { at: 980, label: "集計処理", pct: 52 },
      { at: 1400, label: "UI構築", pct: 68 },
      { at: 2000, label: "最終調整", pct: 80 }
    ];
    plan.forEach((step) => {
      const tid = setTimeout(() => setStage(step.label, step.pct), step.at);
      stageTimers.push(tid);
    });
  };
  const startProgress = () => {
    if (progressTimer) return;
    progressTimer = setInterval(() => {
      const cap = Math.max(softTarget, 90);
      const remain = Math.max(0, cap - progress);
      const step = Math.max(0.3, remain * 0.08);
      setProgress(progress + step);
      if (progress >= cap && progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }, 180);
  };
  const stopProgress = () => {
    if (progressTimer) {
      clearInterval(progressTimer);
      progressTimer = null;
    }
  };
  const showFact = () => {
    if (!factNode || !shuffled.length) return;
    factNode.classList.remove("is-changing");
    // force reflow for transition restart
    void factNode.offsetWidth;
    factNode.classList.add("is-changing");
    factNode.textContent = shuffled[factIdx % shuffled.length];
    factIdx += 1;
  };
  const startFacts = () => {
    if (!factNode || factTimer) return;
    showFact();
    factTimer = setInterval(showFact, FACT_INTERVAL_MS);
  };
  const stopFacts = () => {
    if (factTimer) {
      clearInterval(factTimer);
      factTimer = null;
    }
  };

  const show = () => {
    if (hideTimer) {
      clearTimeout(hideTimer);
      hideTimer = null;
    }
    clearStageTimers();
    stopProgress();
    stopFacts();
    softTarget = 0;
    setProgress(0);
    setStage("初期化", 5);
    loader.classList.remove("hidden");
    loader.setAttribute("aria-hidden", "false");
    startStagePlan();
    startProgress();
    startFacts();
  };
  const hide = () => {
    const elapsed = performance.now() - bootAt;
    const wait = Math.max(0, MIN_VISIBLE_MS - elapsed);
    if (hideTimer) clearTimeout(hideTimer);
    setStage("完了", 96);
    hideTimer = setTimeout(() => {
      setProgress(100);
      loader.classList.add("hidden");
      loader.setAttribute("aria-hidden", "true");
      stopProgress();
      stopFacts();
      clearStageTimers();
      hideTimer = null;
    }, wait);
  };

  document.addEventListener("submit", () => show(), true);
  document.addEventListener("click", (e) => {
    const a = e.target.closest("a[href]");
    if (!a) return;
    const href = a.getAttribute("href") || "";
    if (!href || href.startsWith("#") || href.startsWith("javascript:")) return;
    if (a.target === "_blank" || e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) return;
    show();
  }, true);

  // F5/ブラウザ再読み込み/離脱時にも表示
  window.addEventListener("beforeunload", () => show());

  window.addEventListener("pageshow", (e) => {
    // bfcacheからの復元時も含めて確実に非表示
    hide();
    if (e.persisted) hide();
  });
  document.addEventListener("readystatechange", () => {
    if (document.readyState === "interactive") setStage("DOM構築", 86);
    if (document.readyState === "complete") setStage("最終チェック", 94);
  });
  window.addEventListener("load", () => hide());
  // turbolinks等なしの場合はDOMContentLoadedでも隠す
  document.addEventListener("DOMContentLoaded", () => hide());
})();

(() => {
  const iconNodes = document.querySelectorAll("i.bi-geo-alt");
  if (!iconNodes.length) return;
  iconNodes.forEach((icon) => {
    const parent = icon.parentElement;
    if (!parent) return;
    if (parent.closest("a, button")) return;
    if (parent.dataset.mapLinked === "1") return;
    const text = (parent.textContent || "").replace(/\s+/g, " ").trim();
    if (!text) return;
    const addr = text.replace(/^📍\s*/, "").trim();
    if (!addr) return;
    const link = document.createElement("a");
    link.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.className = "map-link";
    link.innerHTML = parent.innerHTML;
    parent.innerHTML = "";
    parent.appendChild(link);
    parent.dataset.mapLinked = "1";
  });
})();
</script>
</body>
</html>
