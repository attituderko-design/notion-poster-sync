<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtéMis HARMONIA</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="apple-touch-icon" href="/static/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070d17;
    --text:#e9eef8;
    --sub:rgba(182,198,226,.76);
    --line:rgba(74,158,255,.34);
    --line2:rgba(192,112,240,.26);
  }
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0}
  body{
    overflow:hidden;
    background:
      radial-gradient(980px 500px at 16% -8%, rgba(74,158,255,.24), transparent 48%),
      radial-gradient(840px 460px at 94% 2%, rgba(192,112,240,.16), transparent 54%),
      linear-gradient(180deg, #060b15 0%, #070d17 55%, #050913 100%);
    color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
  }
  .stage{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
  .vline{
    position:absolute;left:50%;top:50%;width:1px;height:48vh;transform:translate(-50%,-50%);
    background:linear-gradient(180deg, transparent, rgba(255,255,255,.08), transparent);
    opacity:.4;animation:linePulse 4s ease-in-out infinite;
  }
  .scan{
    position:absolute;left:8%;right:8%;top:44%;height:1px;
    background:linear-gradient(90deg, transparent, var(--line), var(--line2), transparent);
    opacity:.25;filter:blur(.4px);animation:scanMove 5.2s ease-in-out infinite;
  }
  .orb,.orb2,.orb3{
    position:absolute;border-radius:50%;background:rgba(74,158,255,.28);filter:blur(.3px);
    animation:drift 7s ease-in-out infinite;
  }
  .orb{width:4px;height:4px;left:28%;top:22%}
  .orb2{width:3px;height:3px;left:67%;top:31%;animation-delay:.9s}
  .orb3{width:5px;height:5px;left:58%;top:66%;animation-delay:1.6s}
  .center{position:relative;z-index:2;text-align:center;padding:0 20px;opacity:0;transform:translateY(6px);animation:introIn .85s ease forwards}
  .logo{font-family:'Outfit',sans-serif;font-size:44px;font-weight:600;letter-spacing:.06em;text-shadow:0 0 26px rgba(74,158,255,.14)}
  .sub{margin-top:10px;font-family:'Outfit',sans-serif;font-size:15px;letter-spacing:.18em;color:var(--sub);opacity:0;animation:subIn 1.1s .24s ease forwards}
  .tips{margin-top:22px;font-size:13px;color:rgba(180,200,230,.84);opacity:0;animation:subIn 1.1s .45s ease forwards}
  .fadeout{animation:out .42s ease forwards}
  @keyframes introIn{to{opacity:1;transform:translateY(0)}}
  @keyframes subIn{to{opacity:1}}
  @keyframes out{to{opacity:0;transform:translateY(-3px)}}
  @keyframes drift{50%{transform:translateY(-8px) translateX(4px);opacity:.9}}
  @keyframes scanMove{50%{transform:translateY(4px);opacity:.45}}
  @keyframes linePulse{50%{opacity:.68}}
  @media (max-width:640px){
    .logo{font-size:34px}
    .sub{font-size:13px;letter-spacing:.14em}
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="vline" aria-hidden="true"></div>
    <div class="scan" aria-hidden="true"></div>
    <span class="orb" aria-hidden="true"></span>
    <span class="orb2" aria-hidden="true"></span>
    <span class="orb3" aria-hidden="true"></span>
    <section class="center" id="intro">
      <div class="logo">ArtéMis HARMONIA</div>
      <div class="sub">Concert Management System</div>
      <div class="tips">セッションを再接続しています...</div>
    </section>
  </main>
<script>
(() => {
  const NEXT_HREF = {{ (next_href or '/?force_entry=1')|tojson }};
  const intro = document.getElementById("intro");
  const totalMs = 2100;
  const fadeMs = 420;
  setTimeout(() => {
    if (intro) intro.classList.add("fadeout");
  }, Math.max(0, totalMs - fadeMs));
  setTimeout(() => {
    window.location.replace(NEXT_HREF);
  }, totalMs);
})();
</script>
</body>
</html>
